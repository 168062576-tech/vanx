<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 世界地图 - 御龙军虚拟 Agent 世界</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        /* ---- Reset & Variables (match main theme) ---- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0e17;
            --bg2: #1a1a2e;
            --card: #16213e;
            --purple: #667eea;
            --violet: #764ba2;
            --pink: #e84393;
            --cyan: #00cec9;
            --green: #00b894;
            --yellow: #fdcb6e;
            --red: #d63031;
            --orange: #e17055;
            --text: #edf2f7;
            --text2: #a0aec0;
            --muted: #718096;
            --border: rgba(102, 126, 234, 0.2);
            --radius: 12px;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ---- Header ---- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--bg2), var(--card));
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            position: relative;
        }
        .header h1 {
            font-size: 1.2em;
            background: linear-gradient(135deg, var(--purple), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-nav {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .nav-btn {
            padding: 6px 14px;
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text2);
            font-size: 0.82em;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            color: var(--text);
            border-color: var(--purple);
        }
        .nav-btn.active {
            background: rgba(102, 126, 234, 0.25);
            color: var(--purple);
            border-color: var(--purple);
        }

        /* ---- Map Container ---- */
        #map {
            width: 100%;
            height: calc(100vh - 92px);
        }

        /* ---- Stats Overlay ---- */
        .stats-overlay {
            position: absolute;
            top: 102px;
            left: 16px;
            z-index: 999;
            background: rgba(22, 33, 62, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            min-width: 200px;
        }
        .stats-title {
            font-size: 0.85em;
            color: var(--purple);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
            font-size: 0.78em;
        }
        .stats-label { color: var(--text2); }
        .stats-value { color: var(--text); font-weight: 600; }

        /* ---- Legend Overlay ---- */
        .legend-overlay {
            position: absolute;
            bottom: 24px;
            left: 16px;
            z-index: 999;
            background: rgba(22, 33, 62, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
        }
        .legend-title {
            font-size: 0.78em;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0;
            font-size: 0.75em;
            color: var(--text2);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ---- Country Popup ---- */
        .country-popup {
            max-width: 380px;
            max-height: 400px;
        }
        .country-popup h3 {
            font-size: 1em;
            margin-bottom: 6px;
            color: var(--text);
        }
        .country-popup .pop-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .country-popup .pop-stat {
            font-size: 0.78em;
            color: var(--text2);
        }
        .country-popup .pop-stat b {
            color: var(--purple);
        }
        .agent-list-scroll {
            max-height: 260px;
            overflow-y: auto;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 6px;
        }
        .agent-list-scroll::-webkit-scrollbar { width: 4px; }
        .agent-list-scroll::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 2px; }
        .agent-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 2px;
            font-size: 0.78em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .agent-item:last-child { border-bottom: none; }
        .agent-occ-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .agent-name { color: var(--text); font-weight: 500; }
        .agent-info { color: var(--muted); font-size: 0.9em; }

        /* ---- Leaflet Overrides (dark theme) ---- */
        .leaflet-popup-content-wrapper {
            background: rgba(22, 33, 62, 0.95) !important;
            color: var(--text) !important;
            border-radius: var(--radius) !important;
            border: 1px solid var(--border) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
        }
        .leaflet-popup-tip {
            background: rgba(22, 33, 62, 0.95) !important;
            border: 1px solid var(--border) !important;
        }
        .leaflet-popup-close-button {
            color: var(--muted) !important;
            font-size: 18px !important;
        }
        .leaflet-popup-close-button:hover {
            color: var(--text) !important;
        }
        .leaflet-control-zoom a {
            background: rgba(22, 33, 62, 0.9) !important;
            color: var(--text) !important;
            border-color: var(--border) !important;
        }
        .leaflet-control-zoom a:hover {
            background: var(--card) !important;
        }
        .leaflet-control-attribution {
            background: rgba(15, 14, 23, 0.7) !important;
            color: var(--muted) !important;
            font-size: 10px !important;
        }
        .leaflet-control-attribution a {
            color: var(--purple) !important;
        }

        /* ---- Bubble Marker ---- */
        .bubble-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.3);
        }
        .bubble-marker:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 24px rgba(102, 126, 234, 0.5);
        }

        /* ---- City Marker ---- */
        .city-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #fff;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.25);
        }
        .city-marker:hover {
            transform: scale(1.12);
        }

        /* ---- Evolution Control Bar ---- */
        .evolution-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 24px;
            background: rgba(22, 33, 62, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            position: relative;
        }
        .evo-label {
            font-size: 0.88em;
            font-weight: 600;
            background: linear-gradient(135deg, var(--purple), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .evo-status {
            font-size: 0.75em;
            padding: 2px 10px;
            border-radius: 20px;
            background: rgba(99, 110, 114, 0.3);
            color: var(--muted);
            border: 1px solid rgba(99, 110, 114, 0.3);
            min-width: 52px;
            text-align: center;
        }
        .evo-status.running {
            background: rgba(0, 184, 148, 0.2);
            color: var(--green);
            border-color: rgba(0, 184, 148, 0.4);
            animation: evo-pulse 1.5s ease-in-out infinite;
        }
        @keyframes evo-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.3); }
            50% { box-shadow: 0 0 8px 2px rgba(0, 184, 148, 0.2); }
        }
        .evo-btn {
            padding: 4px 12px;
            font-size: 0.78em;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .evo-btn:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(118, 75, 162, 0.4));
            border-color: var(--purple);
            transform: translateY(-1px);
        }
        .evo-btn:active {
            transform: translateY(0);
        }
        .evo-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .evo-btn.auto {
            background: linear-gradient(135deg, rgba(0, 184, 148, 0.2), rgba(0, 206, 201, 0.2));
            border-color: rgba(0, 184, 148, 0.3);
        }
        .evo-btn.auto.active {
            background: linear-gradient(135deg, rgba(0, 184, 148, 0.5), rgba(0, 206, 201, 0.5));
            border-color: var(--green);
            color: #fff;
            box-shadow: 0 0 12px rgba(0, 184, 148, 0.3);
        }
        .evo-month {
            font-size: 0.82em;
            color: var(--cyan);
            font-weight: 600;
            margin-left: auto;
        }

        /* ---- Loading Overlay ---- */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 2000;
            background: rgba(15, 14, 23, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.5s;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 0.9em;
            color: var(--text2);
        }

        /* ---- Connection Lines ---- */
        .connection-line {
            stroke: var(--purple);
            stroke-opacity: 0.15;
            stroke-width: 1;
            fill: none;
        }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex;align-items:center;gap:14px">
        <h1>🌍 世界地图 - Agent 地理分布</h1>
    </div>
    <div class="header-nav">
        <a href="/" class="nav-btn active">🌍 世界地图</a>
        <a href="/dashboard" class="nav-btn">📊 仪表盘</a>
        <a href="/console" class="nav-btn">🎮 控制台</a>
        <a href="/demo" class="nav-btn">🎬 演示</a>
        <a href="/reports" class="nav-btn">📊 报告</a>
    </div>
</div>

<div class="evolution-bar">
    <span class="evo-label">🧬 世界演化</span>
    <span class="evo-status" id="evoStatus">已停止</span>
    <button class="evo-btn" onclick="evolveMonths(1)">+1月</button>
    <button class="evo-btn" onclick="evolveMonths(6)">+6月</button>
    <button class="evo-btn" onclick="evolveMonths(12)">+1年</button>
    <button class="evo-btn auto" id="evoAutoBtn" onclick="toggleAutoEvolve()">▶ 自动</button>
    <span class="evo-month" id="evoMonth">第 0 月</span>
</div>

<div id="map"></div>

<!-- Stats Overlay -->
<div class="stats-overlay" id="statsOverlay">
    <div class="stats-title">📊 全球 Agent 概览</div>
    <div class="stats-row"><span class="stats-label">总人口</span><span class="stats-value" id="stat-total">--</span></div>
    <div class="stats-row"><span class="stats-label">国家</span><span class="stats-value" id="stat-countries">--</span></div>
    <div class="stats-row"><span class="stats-label">职业类型</span><span class="stats-value" id="stat-jobs">--</span></div>
    <div class="stats-row"><span class="stats-label">平均年龄</span><span class="stats-value" id="stat-age">--</span></div>
    <div class="stats-row"><span class="stats-label">平均收入</span><span class="stats-value" id="stat-income">--</span></div>
</div>

<!-- Legend Overlay -->
<div class="legend-overlay" id="legendOverlay">
    <div class="legend-title">👷 职业颜色</div>
    <div id="legend-items"></div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在加载 Agent 数据...</div>
</div>

// Build COUNTRY_COLORS dynamically
const COUNTRY_COLORS = {};
const _regionCounters = {};
for (const [nat, region] of Object.entries(REGION_MAP)) {
    if (!_regionCounters[region]) _regionCounters[region] = 0;
    const palette = REGION_COLORS[region] || REGION_COLORS.others;
    const c = palette[_regionCounters[region] % palette.length];
    COUNTRY_COLORS[nat] = { bg: c + 'b3', border: c };  // b3 = 70% opacity
    _regionCounters[region]++;
}

let countryGroups = {};   // nationality -> [agents]
let countryMarkers = {};  // nationality -> L.marker (bubble)
let cityMarkers = [];     // L.marker[]
let connectionLines = []; // L.polyline[]

// ============================================================
// Initialize Map
// ============================================================
function initMap() {
    map = L.map('map', {
        center: [30, 50],
        zoom: 3,
        minZoom: 2,
        maxZoom: 12,
        zoomControl: true,
        attributionControl: true,
    });

    // Dark tile layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19,
    }).addTo(map);

    // Load data
    loadAgents();

    // Zoom-level driven visibility
    map.on('zoomend', onZoomChange);
}

// ============================================================
// Load Agent Data
// ============================================================
async function loadAgents() {
    try {
        const resp = await fetch('/api/agents/display?limit=10000');
        const data = await resp.json();

        if (data.data && data.data.agents) {
            allAgents = data.data.agents;
        } else if (data.agents) {
            allAgents = data.agents;
        } else if (Array.isArray(data)) {
            allAgents = data;
        } else {
            allAgents = [];
        }

        processAgents();
        renderMap();
        updateStats();
        renderLegend();

        // Hide loading
        document.getElementById('loadingOverlay').classList.add('hidden');
    } catch (err) {
        console.error('Failed to load agents:', err);
        document.querySelector('.loading-text').textContent = '❌ 加载失败: ' + err.message;
    }
}

// ============================================================
// Process & Group Agents
// ============================================================
// CN nationality to key mapping
const NAT_KEY_MAP = {'中国':'chinese','日本':'japanese','韩国':'korean','英国':'english','德国':'german','法国':'french','西班牙':'spanish','沙特':'arabic','印度':'indian','俄罗斯':'russian'};

function processAgents() {
    countryGroups = {};
    allAgents.forEach(agent => {
        let nat = (agent.nationality || agent.culture || 'unknown');
        // Map Chinese nationality names to keys
        nat = NAT_KEY_MAP[nat] || nat.toLowerCase();
        if (!countryGroups[nat]) countryGroups[nat] = [];
        countryGroups[nat].push(agent);
    });
}

// ============================================================
// Render Map
// ============================================================
function renderMap() {
    // Clear existing
    Object.values(countryMarkers).forEach(m => map.removeLayer(m));
    cityMarkers.forEach(m => map.removeLayer(m));
    connectionLines.forEach(l => map.removeLayer(l));
    countryMarkers = {};
    cityMarkers = [];
    connectionLines = [];

    // Draw connection lines between countries (subtle)
    drawConnectionLines();

    // Draw country bubbles
    for (const [nat, coords] of Object.entries(COUNTRY_COORDS)) {
        const agents = countryGroups[nat] || [];
        const count = agents.length;
        if (count === 0) continue;

        // Bubble size: scale by agent count
        const minSize = 36;
        const maxSize = 80;
        const maxCount = Math.max(...Object.values(countryGroups).map(a => a.length), 1);
        const size = minSize + (maxSize - minSize) * Math.sqrt(count / maxCount);

        const color = COUNTRY_COLORS[nat] || { bg: 'rgba(102,126,234,0.7)', border: '#667eea' };

        const icon = L.divIcon({
            className: '',
            html: `<div class="bubble-marker" style="
                width:${size}px;
                height:${size}px;
                background: radial-gradient(circle at 35% 35%, ${color.bg}, rgba(0,0,0,0.3));
                border-color: ${color.border};
            ">${count}</div>`,
            iconSize: [size, size],
            iconAnchor: [size / 2, size / 2],
        });

        const marker = L.marker([coords.lat, coords.lng], { icon }).addTo(map);
        marker.on('click', () => showCountryPopup(nat, coords, agents, marker));

        // Tooltip on hover
        marker.bindTooltip(`${coords.flag} ${coords.name} · ${count} Agent`, {
            direction: 'top',
            className: 'dark-tooltip',
            offset: [0, -size / 2],
        });

        countryMarkers[nat] = marker;

        // City markers (visible at higher zoom)
        coords.cities.forEach(city => {
            // Distribute agents to cities (round-robin)
            const cityAgents = agents.filter((_, i) => i % coords.cities.length === coords.cities.indexOf(city));
            const cityCount = cityAgents.length;
            if (cityCount === 0) return;

            const citySize = Math.max(22, Math.min(40, 22 + cityCount / 10));
            const cityIcon = L.divIcon({
                className: '',
                html: `<div class="city-marker" style="
                    width:${citySize}px;
                    height:${citySize}px;
                    background: ${color.bg};
                    border-color: ${color.border};
                    font-size:${citySize < 28 ? 9 : 11}px;
                ">${cityCount}</div>`,
                iconSize: [citySize, citySize],
                iconAnchor: [citySize / 2, citySize / 2],
            });

            const cm = L.marker([city.lat, city.lng], { icon: cityIcon });
            cm.bindTooltip(`${city.name} · ${cityCount} Agent`, {
                direction: 'top',
                className: 'dark-tooltip',
                offset: [0, -citySize / 2],
            });
            cm.on('click', () => showCityPopup(nat, city, cityAgents, cm));

            // Start hidden; show on zoom
            cityMarkers.push({ marker: cm, nat });
        });
    }

    onZoomChange(); // set initial visibility
}

// ============================================================
// Connection Lines — only within same region, and only for top-populated countries
// ============================================================
function drawConnectionLines() {
    const nats = Object.keys(countryGroups).filter(n => COUNTRY_COORDS[n]);

    // Group by region
    const regionNats = {};
    nats.forEach(n => {
        const r = REGION_MAP[n] || 'others';
        if (!regionNats[r]) regionNats[r] = [];
        regionNats[r].push(n);
    });

    for (const [region, members] of Object.entries(regionNats)) {
        // Only draw lines if region has 2+ countries with agents
        if (members.length < 2) continue;

        // Sort by agent count, only connect top 5 per region to avoid clutter
        members.sort((a, b) => (countryGroups[b]?.length || 0) - (countryGroups[a]?.length || 0));
        const top = members.slice(0, 5);

        const regionColor = REGION_COLORS[region]?.[0] || '#667eea';

        for (let i = 0; i < top.length; i++) {
            for (let j = i + 1; j < top.length; j++) {
                const a = COUNTRY_COORDS[top[i]];
                const b = COUNTRY_COORDS[top[j]];
                if (!a || !b) continue;
                const line = L.polyline([[a.lat, a.lng], [b.lat, b.lng]], {
                    color: regionColor,
                    weight: 1,
                    opacity: 0.18,
                    dashArray: '4 8',
                }).addTo(map);
                connectionLines.push(line);
            }
        }
    }
}

// ============================================================
// Zoom-based Visibility
// ============================================================
function onZoomChange() {
    const zoom = map.getZoom();
    const showCities = zoom >= 5;

    cityMarkers.forEach(({ marker }) => {
        if (showCities) {
            if (!map.hasLayer(marker)) marker.addTo(map);
        } else {
            if (map.hasLayer(marker)) map.removeLayer(marker);
        }
    });

    // Hide country bubbles at high zoom to avoid clutter
    const showBubbles = zoom < 8;
    Object.values(countryMarkers).forEach(m => {
        if (showBubbles) {
            if (!map.hasLayer(m)) m.addTo(map);
        } else {
            if (map.hasLayer(m)) map.removeLayer(m);
        }
    });
}

// ============================================================
// Country Popup
// ============================================================
function showCountryPopup(nat, coords, agents, marker) {
    const color = COUNTRY_COLORS[nat] || { border: '#667eea' };

    // Occupation breakdown
    const occCounts = {};
    let totalAge = 0, totalIncome = 0;
    agents.forEach(a => {
        const occ = a.occupation || a.job || 'unknown';
        occCounts[occ] = (occCounts[occ] || 0) + 1;
        totalAge += a.age || 0;
        totalIncome += a.income || a.monthly_income || 0;
    });
    const avgAge = agents.length ? (totalAge / agents.length).toFixed(1) : '--';
    const avgIncome = agents.length ? Math.round(totalIncome / agents.length).toLocaleString() : '--';

    // Sort occupations by count
    const sortedOcc = Object.entries(occCounts).sort((a, b) => b[1] - a[1]);

    // Build agent list (first 50)
    const displayAgents = agents.slice(0, 50);

    let html = `
        <div class="country-popup">
            <h3>${coords.flag} ${coords.name} <span style="font-size:0.75em;color:var(--muted)">${agents.length} Agent</span></h3>
            <div class="pop-stats">
                <span class="pop-stat">平均年龄 <b>${avgAge}</b></span>
                <span class="pop-stat">平均收入 <b>$${avgIncome}</b></span>
                <span class="pop-stat">城市 <b>${coords.cities.length}</b></span>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
                ${sortedOcc.map(([occ, cnt]) => {
                    const c = OCCUPATION_COLORS[occ] || '#667eea';
                    const n = OCCUPATION_NAMES[occ] || occ;
                    return `<span style="font-size:0.7em;padding:2px 6px;border-radius:4px;background:${c}22;color:${c};border:1px solid ${c}44">${n} ${cnt}</span>`;
                }).join('')}
            </div>
            <div class="agent-list-scroll">
                ${displayAgents.map(a => {
                    const occ = a.occupation || a.job || 'unknown';
                    const c = OCCUPATION_COLORS[occ] || '#667eea';
                    const name = a.name || a.display_name || `Agent #${a.id}`;
                    const age = a.age || '--';
                    const occName = OCCUPATION_NAMES[occ] || occ;
                    return `<div class="agent-item">
                        <span class="agent-occ-dot" style="background:${c}"></span>
                        <span class="agent-name">${name}</span>
                        <span class="agent-info">${occName} · ${age}岁</span>
                    </div>`;
                }).join('')}
                ${agents.length > 50 ? `<div style="text-align:center;font-size:0.72em;color:var(--muted);padding:6px 0">... 还有 ${agents.length - 50} 人</div>` : ''}
            </div>
        </div>
    `;

    marker.bindPopup(html, {
        maxWidth: 380,
        maxHeight: 420,
        className: 'dark-popup',
    }).openPopup();
}

// ============================================================
// City Popup
// ============================================================
function showCityPopup(nat, city, agents, marker) {
    const coords = COUNTRY_COORDS[nat];
    const color = COUNTRY_COLORS[nat] || { border: '#667eea' };

    const displayAgents = agents.slice(0, 30);

    let html = `
        <div class="country-popup">
            <h3>${coords.flag} ${city.name} <span style="font-size:0.75em;color:var(--muted)">${agents.length} Agent</span></h3>
            <div class="agent-list-scroll">
                ${displayAgents.map(a => {
                    const occ = a.occupation || a.job || 'unknown';
                    const c = OCCUPATION_COLORS[occ] || '#667eea';
                    const name = a.name || a.display_name || `Agent #${a.id}`;
                    const occName = OCCUPATION_NAMES[occ] || occ;
                    return `<div class="agent-item">
                        <span class="agent-occ-dot" style="background:${c}"></span>
                        <span class="agent-name">${name}</span>
                        <span class="agent-info">${occName} · ${a.age || '--'}岁</span>
                    </div>`;
                }).join('')}
                ${agents.length > 30 ? `<div style="text-align:center;font-size:0.72em;color:var(--muted);padding:6px 0">... 还有 ${agents.length - 30} 人</div>` : ''}
            </div>
        </div>
    `;

    marker.bindPopup(html, {
        maxWidth: 340,
        maxHeight: 380,
        className: 'dark-popup',
    }).openPopup();
}

// ============================================================
// Update Stats Overlay
// ============================================================
function updateStats() {
    const total = allAgents.length;
    const countries = Object.keys(countryGroups).filter(n => COUNTRY_COORDS[n]).length;

    const occupations = new Set();
    let totalAge = 0, totalIncome = 0, ageCount = 0, incCount = 0;
    allAgents.forEach(a => {
        occupations.add(a.occupation || a.job || 'unknown');
        if (a.age) { totalAge += a.age; ageCount++; }
        const inc = a.income || a.monthly_income || 0;
        if (inc) { totalIncome += inc; incCount++; }
    });

    document.getElementById('stat-total').textContent = total.toLocaleString();
    document.getElementById('stat-countries').textContent = countries;
    document.getElementById('stat-jobs').textContent = occupations.size;
    document.getElementById('stat-age').textContent = ageCount ? (totalAge / ageCount).toFixed(1) : '--';
    document.getElementById('stat-income').textContent = incCount ? ('$' + Math.round(totalIncome / incCount).toLocaleString()) : '--';
}

// ============================================================
// Render Legend
// ============================================================
function renderLegend() {
    const occSet = new Set();
    allAgents.forEach(a => occSet.add(a.occupation || a.job || 'unknown'));

    const container = document.getElementById('legend-items');
    const sorted = [...occSet].sort();

    container.innerHTML = sorted.map(occ => {
        const c = OCCUPATION_COLORS[occ] || '#667eea';
        const n = OCCUPATION_NAMES[occ] || occ;
        return `<div class="legend-item"><span class="legend-dot" style="background:${c}"></span>${n}</div>`;
    }).join('');
}

// ============================================================
// Evolution Control
// ============================================================
let evoCurrentMonth = 0;
let evoAutoTimer = null;
let evoIsRunning = false;

async function evolveMonths(n) {
    const statusEl = document.getElementById('evoStatus');
    const monthEl = document.getElementById('evoMonth');
    const btns = document.querySelectorAll('.evo-btn:not(.auto)');

    // Disable buttons during request
    btns.forEach(b => b.disabled = true);
    statusEl.textContent = '演化中...';
    statusEl.classList.add('running');

    try {
        const resp = await fetch('/api/simulate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ months: n })
        });
        const data = await resp.json();

        // Update month counter
        if (data.data && data.data.months_simulated !== undefined) {
            evoCurrentMonth = data.data.months_simulated;
        } else if (data.current_month !== undefined) {
            evoCurrentMonth = data.current_month;
        } else {
            evoCurrentMonth += n;
        }
        monthEl.textContent = `第 ${evoCurrentMonth} 月`;

        // Refresh map data (async, don't block evolution)
        loadAgents().catch(e => console.warn('Refresh agents:', e));

        if (!evoAutoTimer) {
            statusEl.textContent = '已完成';
            statusEl.classList.remove('running');
            setTimeout(() => {
                if (!evoAutoTimer) {
                    statusEl.textContent = '已停止';
                }
            }, 2000);
        }
    } catch (err) {
        console.error('Evolution failed:', err);
        statusEl.textContent = '❌ 失败';
        statusEl.classList.remove('running');
        setTimeout(() => {
            if (!evoAutoTimer) {
                statusEl.textContent = '已停止';
            }
        }, 3000);
    } finally {
        btns.forEach(b => b.disabled = false);
    }
}

function toggleAutoEvolve() {
    const btn = document.getElementById('evoAutoBtn');
    const statusEl = document.getElementById('evoStatus');

    if (evoAutoTimer) {
        // Stop auto evolution
        clearInterval(evoAutoTimer);
        evoAutoTimer = null;
        btn.textContent = '▶ 自动';
        btn.classList.remove('active');
        statusEl.textContent = '已停止';
        statusEl.classList.remove('running');
    } else {
        // Start auto evolution: every 3 seconds, evolve 1 month
        btn.textContent = '⏸ 停止';
        btn.classList.add('active');
        statusEl.textContent = '自动演化中';
        statusEl.classList.add('running');
        evoAutoTimer = setInterval(() => {
            evolveMonths(1);
        }, 3000);
        // Also immediately trigger the first one
        evolveMonths(1);
    }
}

// Fetch initial month on load
async function fetchCurrentMonth() {
    try {
        const resp = await fetch('/api/health');
        const data = await resp.json();
        if (data.months_simulated !== undefined) {
            evoCurrentMonth = data.months_simulated;
            document.getElementById('evoMonth').textContent = `第 ${evoCurrentMonth} 月`;
        } else if (data.data && data.data.months_simulated !== undefined) {
            evoCurrentMonth = data.data.months_simulated;
            document.getElementById('evoMonth').textContent = `第 ${evoCurrentMonth} 月`;
        }
    } catch (e) {
        // Ignore - will start from 0
    }
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
    initMap();
    fetchCurrentMonth();
});
</script>
